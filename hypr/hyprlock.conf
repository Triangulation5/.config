source = ~/.config/hypr/hyprlock-wallpaper.conf

$font = FiraCode Nerd Font Mono

background {
    monitor =
    path = $background
    blur_passes = 2
    contrast = 0.8
    brightness = 0.5
    crossfade_time = 0.5
}

animations {
    enabled = true
    bezier = easeOut, 0.16, 1, 0.3, 1

    animation = fadeIn, 1, 4, easeOut, slide top
    animation = fadeOut, 1, 4, easeOut

    animation = inputFieldFade, 1, 18, easeOut
    animation = inputFieldColors, 1, 6, easeOut
    animation = inputFieldWidth, 1, 14, easeOut
    animation = inputFieldDots, 1, 6, easeOut
}

auth {
    pam:enabled = true

    fingerprint {
        enabled = true
        ready_message = Fingerprint Ready
        present_message = Scanning...
    }
}

label {
    monitor =
    text = cmd[update:1000] date +"%-I:%M %p"
    font_size = 100
    font_family = $font
    color = rgba(255, 255, 255, 0.9)

    position = 0, 70
    halign = center
    valign = center
}

