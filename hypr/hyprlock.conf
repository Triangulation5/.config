input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true

    outer_color = rgba(37, 37, 48, 0.95)
    inner_color = rgba(20, 20, 21, 0.90)
    font_color  = rgba(205, 205, 205, 1.0)

    check_color = rgba(127, 165, 99, 1.0)
    fail_color  = rgba(216, 100, 126, 1.0)

    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff99">Enter Password...</span>
    hide_input = false
    position = 0, 450
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] bash ~/.config/hypr/scripts/songinfo.sh
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = $font

    position = 0, 40
    halign = center
    valign = bottom
}

label {
    monitor =
        text = 󰐥
        onclick = shutdown now
        font_size = 20
        position = -230, -40
        halign = right
        valign = top
}

label {
    monitor =
    text = 󰜉
    onclick = reboot now
    font_size = 20
    position = -190, -40
    halign = right
    valign = top
}

label {
    monitor =
    text = 󰤄
    onclick = systemctl suspend
    font_size = 20
    position = -150, -40
    halign = right
    valign = top
}
