label {
    text = cmd[update:30000] sh -c 'cap=$(cat /sys/class/power_supply/BAT0/capacity); case $cap in [0-9]) icon="󰂎";; 1[0-9]) icon="󰁺";; 2[0-9]) icon="󰁻";; 3[0-9]) icon="󰁼";; 4[0-9]) icon="󰁽";; 5[0-9]) icon="󰁾";; 6[0-9]) icon="󰁿";; 7[0-9]) icon="󰂀";; 8[0-9]) icon="󰂁";; 9[0-9]) icon="󰂂";; 100) icon="󰁹";; esac; printf "%s %s%%" "$icon" "$cap"'

    position = -40, -40
    halign = right
    valign = top
}

shape {
    monitor =
    size = 1895, 70
    color = rgba(0, 0, 0, 0.08)
    rounding = 05
    border_size = 0

    position = 0, -25
    halign = center
    valign = top
}

shape {
    monitor =
    size = 1895, 60
    color = rgba(20, 20, 21, 0.90)
    rounding = 05
    border_size = 1
    border_color = rgba(37, 37, 48, 0.95)
    rotate = 0
    xray = false

    position = 0, -25
    halign = center
    valign = top
}

