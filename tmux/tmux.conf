set -a terminal-features "tmux-256color:RGB"
set -g extended-keys on

set -g prefix C-SPACE
unbind C-b
bind C-SPACE send-prefix

set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g remain-on-exit off

set -g status-position top
set -g status-justify absolute-centre
set -g status-interval 5

set -g status-style "bg=default"
set -g status-left "#S"
set -g status-right ""

set -g window-status-separator ""
set -g window-status-format \
  "#[fg=colour240] #[default] #I:#W#{?window_flags,#{window_flags},} #[fg=colour240]"
set -g window-status-current-format \
  "#[fg=colour252] #[default] #I:#W#{?window_flags,#{window_flags},} #[fg=colour252]"
set -g window-status-current-style "fg=colour255,bg=default,bold"
