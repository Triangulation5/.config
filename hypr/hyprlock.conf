$font = FiraCode Nerd Font Mono
$background = ~/Pictures/Road-to-Samarkand.png

background {
    monitor =
    path = $background
    blur_passes = 3
    contrast = 0.8
    brightness = 0.5
    vignette = 0.5
    vignette_opacity = 0.3
    crossfade_time = 0.5
}

