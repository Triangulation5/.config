shape {
    monitor =
    size = 648, 410
    # size = 648, 672
    color = rgba(0, 0, 0, 0.08)
    rounding = 40
    border_size = 0

    position = 0, 22
    halign = center
    valign = center
}

shape {
    monitor =
    size = 640, 400
    # size = 640, 670
    color = rgba(20, 20, 21, 0.50)
    rounding = 35
    border_size = 1
    border_color = rgba(205, 205, 205, 0.08)
    rotate = 0
    xray = false

    # position = 0, -120 
    position = 0, 30 
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true

    outer_color = rgba(37, 37, 48, 0.95)
    inner_color = rgba(20, 20, 21, 0.90)
    font_color  = rgba(205, 205, 205, 1.0)

    check_color = rgba(127, 165, 99, 1.0)
    fail_color  = rgba(216, 100, 126, 1.0)

    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff99">Enter Password...</span>
    hide_input = false
    position = 0, 450
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] bash ~/.config/hypr/scripts/songinfo.sh
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = $font

    position = 0, 50
    halign = center
    valign = bottom
}

general {
    no_fade_in = true
    grace = 0
    disable_loading = true
}

