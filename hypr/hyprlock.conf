    text = cmd[update:30000] sh -c 'cap=$(cat /sys/class/power_supply/BAT0/capacity); case $cap in [0-9]) icon="σΑ²é";; 1[0-9]) icon="σΑ¹Κ";; 2[0-9]) icon="σΑ¹Μ";; 3[0-9]) icon="σΑ¹Φ";; 4[0-9]) icon="σΑ¹Ϋ";; 5[0-9]) icon="σΑ¹Ψ";; 6[0-9]) icon="σΑ¹Ω";; 7[0-9]) icon="σΑ²Ä";; 8[0-9]) icon="σΑ²¹";; 9[0-9]) icon="σΑ²²";; 100) icon="σΑ¹Ι";; esac; printf "%s %s%%" "$icon" "$cap"'

    position = -40, -40
